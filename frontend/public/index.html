<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سمر أكاديمي - الاختبارات التفاعلية (النسخة المطورة)</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --primary: #1e3a8a; --primary-dark: #172554; --secondary: #2563eb;
  --gold: #f59e0b; --success: #059669; --success-bg: #d1fae5;
  --danger: #dc2626; --danger-bg: #fee2e2; --gray: #64748b;
  --bg: #f8fafc; --white: #ffffff; --radius: 24px;
}
body {
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(135deg, #eff6ff 0%, #f0fdf4 100%);
  min-height: 100vh; padding: 20px; display: flex; justify-content: center;
}
.app {
  width: 100%; max-width: 1000px; background: var(--white);
  border-radius: var(--radius); overflow: hidden; box-shadow: 0 10px 35px rgba(0,0,0,.1);
}
.header {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white; text-align: center; padding: 30px 20px;
}
.header h1 { font-size: 1.8rem; margin-bottom: 15px; }
.grade-selector, .subject-selector {
  display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
  margin-top: 15px;
}
.grade-btn, .subject-btn {
  background: rgba(255,255,255,.15); border: 2px solid white; color: white;
  padding: 8px 20px; border-radius: 40px; font-weight: bold;
  cursor: pointer; transition: .2s;
}
.grade-btn.active, .grade-btn:hover,
.subject-btn.active, .subject-btn:hover {
  background: var(--gold); color: #78350f; border-color: var(--gold);
}
.progress-bar { width: 100%; height: 8px; background: #dbeafe; }
.progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--gold), #fbbf24); transition: width .3s; }
.stats {
  display: flex; justify-content: space-around; padding: 12px 20px;
  background: #f1f5f9; border-bottom: 1px solid #e2e8f0;
  flex-wrap: wrap; gap: 10px;
}
.stat { font-weight: 800; color: var(--primary); background: white; padding: 4px 12px; border-radius: 50px; }
.quiz { padding: 25px; }
.topic { background: #dbeafe; display: inline-block; padding: 5px 15px; border-radius: 30px; margin-bottom: 15px; font-weight: 800; color: var(--primary); }
.question { font-size: 1.3rem; background: #f8fafc; padding: 20px; border-radius: 20px; border-right: 5px solid var(--primary); margin-bottom: 25px; line-height: 1.6; }
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.option {
  background: white; border: 2px solid #e2e8f0; border-radius: 16px;
  padding: 12px 18px; cursor: pointer; transition: .2s; font-weight: 700;
}
.option:hover:not(.locked) { border-color: var(--secondary); background: #f0f7ff; transform: translateY(-2px); }
.option.correct { background: var(--success-bg); border-color: var(--success); }
.option.wrong { background: var(--danger-bg); border-color: var(--danger); }
.locked { pointer-events: none; }
.match-container {
  background: #f1f5f9; border-radius: 20px; padding: 20px;
  margin: 15px 0;
}
.match-pairs {
  display: flex; flex-direction: column; gap: 15px;
}
.match-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 15px; flex-wrap: wrap; background: white; padding: 12px; border-radius: 16px;
}
.match-left {
  flex: 1; font-weight: bold; background: #e0e7ff; padding: 10px; border-radius: 12px; text-align: center;
}
.match-right select {
  padding: 10px 15px; border-radius: 12px; border: 2px solid #cbd5e1;
  font-family: 'Cairo'; font-weight: bold; background: white;
}
.check-match-btn {
  background: var(--secondary); color: white; border: none;
  padding: 10px 25px; border-radius: 30px; font-weight: bold;
  margin-top: 15px; cursor: pointer; display: block; margin-left: auto; margin-right: auto;
}
.feedback {
  margin-top: 20px; padding: 12px 18px; border-radius: 16px;
  display: none; animation: slideUp .3s;
}
.feedback.success { background: var(--success-bg); border: 2px solid #6ee7b7; color: #065f46; }
.feedback.error { background: var(--danger-bg); border: 2px solid #fca5a5; color: #991b1b; }
.timer-notice {
  margin-top: 15px;
  padding: 8px;
  background: #fef3c7;
  border-radius: 30px;
  color: #92400e;
  font-size: 0.9rem;
  text-align: center;
  display: none;
}
.footer { padding: 20px; text-align: center; border-top: 1px solid #e2e8f0; }
.next-btn, .restart-btn, .reset-progress-btn {
  background: var(--primary); color: white; border: none;
  padding: 12px 35px; border-radius: 30px; font-weight: bold;
  cursor: pointer; margin: 0 8px;
}
.restart-btn { background: var(--success); }
.reset-progress-btn { background: var(--danger); }
@keyframes slideUp { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
@media (max-width: 640px) { .options { grid-template-columns: 1fr; } .question { font-size: 1.1rem; } .match-row { flex-direction: column; } }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- استبدل قسم الـ header في كود المحرك بهذا القسم المخصص للمنهج السعودي -->
<div class="header">
    <h1>📚 منصة أكاديمية الأستاذ (المناهج السعودية)</h1>
    
    <!-- الصفوف الدراسية المطلوبة فقط -->
    <div class="grade-selector" id="gradeSelector">
      <button data-grade="p4" class="grade-btn">رابع ابتدائي</button>
      <button data-grade="p5" class="grade-btn active">خامس ابتدائي</button>
      <button data-grade="p6" class="grade-btn">سادس ابتدائي</button>
      <button data-grade="m1" class="grade-btn">أول متوسط</button>
      <button data-grade="m2" class="grade-btn">ثاني متوسط</button>
      <button data-grade="m3" class="grade-btn">ثالث متوسط</button>
    </div>
    
    <!-- المواد الدراسية الأساسية -->
    <div class="subject-selector" id="subjectSelector">
      <button data-subject="arabic" class="subject-btn">🇸🇦 لغة عربية</button>
      <button data-subject="science" class="subject-btn">🔬 علوم</button>
      <button data-subject="social" class="subject-btn active">🌍 دراسات اجتماعية</button>
      <button data-subject="math" class="subject-btn">📐 رياضيات</button>
    </div>
</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="stats" id="statsBar">
    <div class="stat">📋 السؤال <span id="statCurrent">0</span>/<span id="statTotal">0</span></div>
    <div class="stat">⭐ النقاط <span id="statScore">0</span></div>
    <div class="stat">✅ صحيح <span id="statCorrect">0</span></div>
    <div class="stat">❌ خطأ <span id="statWrong">0</span></div>
  </div>
  <div class="quiz" id="quizContainer"><div style="text-align:center;padding:50px;">اختر الصف والمادة لبدء الاختبار</div></div>
  <div class="timer-notice" id="timerNotice"></div>
  <div class="footer">
    <button class="next-btn" id="nextBtn" style="display:none;">← التالي (تجاوز الانتظار)</button>
    <button class="restart-btn" id="restartBtn">🔄 إعادة الاختبار</button>
    <button class="reset-progress-btn" id="resetProgressBtn">🗑️ حذف التقدم المحفوظ</button>
  </div>
</div>

<script>
// ============================================================
// محرك الاختبار المطور - يدعم MCQ, True/False, Matching
// مع حفظ التقدم (localStorage) وانتقال تلقائي بعد 5/15 ثانية
// ============================================================
let currentGrade = 5;
let currentSubject = 'social';
let questions = [];
let currentIndex = 0;
let score = 0, correctCount = 0, wrongCount = 0;
let answered = false;
let totalQuestions = 0;
let autoTimer = null;
let nextBtn = document.getElementById('nextBtn');
let restartBtn = document.getElementById('restartBtn');
let resetProgressBtn = document.getElementById('resetProgressBtn');
let timerNotice = document.getElementById('timerNotice');

// دالة لحفظ التقدم
function saveProgress() {
  if (!questions.length) return;
  const progress = {
    grade: currentGrade,
    subject: currentSubject,
    currentIndex,
    score,
    correctCount,
    wrongCount,
    answered,
    totalQuestions,
    // لا نحفظ إجابات محددة، فقط الحالة العامة (لأن الأسئلة قد تتغير)
    timestamp: Date.now()
  };
  localStorage.setItem('examProgress', JSON.stringify(progress));
}

// دالة لتحميل التقدم إذا كان متوافقاً
function loadProgress() {
  const saved = localStorage.getItem('examProgress');
  if (!saved) return false;
  try {
    const p = JSON.parse(saved);
    if (p.grade === currentGrade && p.subject === currentSubject && p.totalQuestions === totalQuestions) {
      currentIndex = p.currentIndex;
      score = p.score;
      correctCount = p.correctCount;
      wrongCount = p.wrongCount;
      answered = p.answered;
      updateStats();
      updateProgress();
      return true;
    }
  } catch(e) { console.warn("خطأ في تحميل التقدم", e); }
  return false;
}

// دالة لحذف التقدم
function resetProgress() {
  localStorage.removeItem('examProgress');
  // إعادة تحميل الأسئلة من البداية
  loadQuestions();
}

// إلغاء المؤقت إذا كان موجوداً
function clearAutoTimer() {
  if (autoTimer) {
    clearTimeout(autoTimer);
    autoTimer = null;
  }
  timerNotice.style.display = 'none';
  timerNotice.innerHTML = '';
}

// بدء المؤقت للانتقال التلقائي
function startAutoTransition(isCorrect) {
  clearAutoTimer();
  const delay = isCorrect ? 5000 : 15000; // 5 ثواني صحيح، 15 خطأ
  const seconds = delay / 1000;
  timerNotice.style.display = 'block';
  timerNotice.innerHTML = `⏳ سيتم الانتقال إلى السؤال التالي تلقائياً بعد ${seconds} ثانية... (اضغط "التالي" لتجاوز الانتظار)`;
  autoTimer = setTimeout(() => {
    if (!nextBtn.style.display || nextBtn.style.display === 'inline-block') {
      // الانتقال إذا لم يتم الضغط يدوياً بعد
      nextQuestion();
    }
    clearAutoTimer();
  }, delay);
}

// تحديث الإحصائيات وشريط التقدم
function updateStats() {
  document.getElementById('statScore').textContent = score;
  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = wrongCount;
  document.getElementById('statCurrent').textContent = currentIndex+1;
  document.getElementById('statTotal').textContent = totalQuestions;
  let pct = totalQuestions ? ((currentIndex) / totalQuestions) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

// تحميل الأسئلة من ملف JSON
async function loadQuestions() {
  const path = `data/grade${currentGrade}/${currentSubject}.json`;
  document.getElementById('quizContainer').innerHTML = '<div style="text-align:center;padding:50px;">⏳ جاري تحميل الأسئلة...</div>';
  try {
    const res = await fetch(path);
    if (!res.ok) throw new Error(`HTTP ${res.status} - الملف غير موجود أو لا يمكن الوصول إليه`);
    let data;
    try {
      data = await res.json();
    } catch(jsonErr) {
      throw new Error(`خطأ في صيغة JSON: ${jsonErr.message}. تأكد من صحة الملف.`);
    }
    if (!data.questions || !data.questions.length) throw new Error('لا توجد أسئلة في الملف');
    questions = data.questions;
    if (data.shuffle) shuffleArray(questions);
    totalQuestions = questions.length;
    document.getElementById('statTotal').textContent = totalQuestions;
    // محاولة استعادة التقدم
    const loaded = loadProgress();
    if (!loaded) {
      // بداية جديدة
      currentIndex = 0;
      score = 0;
      correctCount = 0;
      wrongCount = 0;
      answered = false;
    }
    updateStats();
    updateProgress();
    renderQuestion();
  } catch(e) {
    console.error(e);
    document.getElementById('quizContainer').innerHTML = `<div style="color:red;padding:20px;">⚠️ فشل تحميل الأسئلة:<br>${e.message}<br><br>تأكد من وجود الملف: ${path}<br>وتأكد من صحة JSON باستخدام موقع مثل jsonlint.com</div>`;
    nextBtn.style.display = 'none';
  }
}

// عرض السؤال الحالي
function renderQuestion() {
  if (!questions.length || currentIndex >= totalQuestions) {
    showResult();
    return;
  }
  clearAutoTimer();
  const q = questions[currentIndex];
  answered = false;
  const container = document.getElementById('quizContainer');
  let html = `<div class="topic">📘 ${escapeHtml(q.topic || 'موضوع')}</div>
              <div class="question">${escapeHtml(q.question)}</div>`;
  if (q.type === 'mcq') {
    html += `<div class="options">`;
    q.options.forEach((opt, idx) => {
      html += `<div class="option" data-opt="${idx}" onclick="checkMCQ(${idx}, this)">${escapeHtml(opt)}</div>`;
    });
    html += `</div>`;
  } else if (q.type === 'truefalse') {
    html += `<div class="options">`;
    html += `<div class="option" data-opt="true" onclick="checkTrueFalse(true, this)">✅ صواب</div>`;
    html += `<div class="option" data-opt="false" onclick="checkTrueFalse(false, this)">❌ خطأ</div>`;
    html += `</div>`;
  } else if (q.type === 'matching') {
    html += `<div class="match-container"><div class="match-pairs">`;
    q.pairs.forEach((pair, idx) => {
      html += `<div class="match-row" data-pair="${idx}">
                 <div class="match-left">${escapeHtml(pair.left)}</div>
                 <div class="match-right">
                   <select id="matchSelect_${idx}">
                     <option value="">-- اختر الإجابة --</option>`;
      q.rightOptions.forEach((opt, optIdx) => {
        html += `<option value="${optIdx}">${escapeHtml(opt)}</option>`;
      });
      html += `</select></div></div>`;
    });
    html += `</div><button class="check-match-btn" onclick="checkMatching()">تحقق من الوصل</button></div>`;
  }
  html += `<div class="feedback" id="feedbackMsg"></div>`;
  container.innerHTML = html;
  nextBtn.style.display = 'none'; // سيظهر بعد الإجابة
}

// دوال التصحيح (مع حفظ التقدم وبدء المؤقت)
window.checkMCQ = function(selectedIdx, element) {
  if (answered) return;
  answered = true;
  const q = questions[currentIndex];
  const correctIdx = q.correct;
  const isCorrect = (selectedIdx === correctIdx);
  const allOpts = document.querySelectorAll('.option');
  allOpts.forEach(opt => opt.classList.add('locked'));
  if (isCorrect) {
    element.classList.add('correct');
    score += (q.points || 10);
    correctCount++;
    showFeedback(true, q.explanation || 'إجابة صحيحة!');
  } else {
    element.classList.add('wrong');
    if (allOpts[correctIdx]) allOpts[correctIdx].classList.add('correct');
    wrongCount++;
    showFeedback(false, `الإجابة الصحيحة: ${escapeHtml(q.options[correctIdx])}<br>${q.explanation || ''}`);
  }
  updateStats();
  saveProgress();  // حفظ بعد كل إجابة
  nextBtn.style.display = 'inline-block';
  startAutoTransition(isCorrect);
};

window.checkTrueFalse = function(selected, element) {
  if (answered) return;
  answered = true;
  const q = questions[currentIndex];
  const isCorrect = (selected === q.correct);
  const allOpts = document.querySelectorAll('.option');
  allOpts.forEach(opt => opt.classList.add('locked'));
  if (isCorrect) {
    element.classList.add('correct');
    score += (q.points || 10);
    correctCount++;
    showFeedback(true, q.explanation || 'إجابة صحيحة!');
  } else {
    element.classList.add('wrong');
    const correctAns = q.correct === true ? 'صواب' : 'خطأ';
    allOpts.forEach(opt => {
      if (opt.innerText.includes(correctAns)) opt.classList.add('correct');
    });
    wrongCount++;
    showFeedback(false, `الإجابة الصحيحة: ${correctAns}<br>${q.explanation || ''}`);
  }
  updateStats();
  saveProgress();
  nextBtn.style.display = 'inline-block';
  startAutoTransition(isCorrect);
};

window.checkMatching = function() {
  if (answered) return;
  const q = questions[currentIndex];
  let allCorrect = true;
  for (let i = 0; i < q.pairs.length; i++) {
    const select = document.getElementById(`matchSelect_${i}`);
    const selectedVal = parseInt(select.value);
    if (selectedVal !== q.pairs[i].rightIndex) allCorrect = false;
  }
  answered = true;
  if (allCorrect) {
    score += (q.points || 10);
    correctCount++;
    showFeedback(true, q.explanation || 'جميع الوصلات صحيحة!');
  } else {
    wrongCount++;
    let correctAnswersStr = '';
    for (let i = 0; i < q.pairs.length; i++) {
      correctAnswersStr += `${q.pairs[i].left} ← ${q.rightOptions[q.pairs[i].rightIndex]}\n`;
    }
    showFeedback(false, `الإجابات الصحيحة:<br>${escapeHtml(correctAnswersStr)}<br>${q.explanation || ''}`);
  }
  updateStats();
  saveProgress();
  nextBtn.style.display = 'inline-block';
  startAutoTransition(allCorrect);
};

function showFeedback(isCorrect, msg) {
  const fb = document.getElementById('feedbackMsg');
  fb.className = `feedback ${isCorrect ? 'success' : 'error'}`;
  fb.innerHTML = msg;
  fb.style.display = 'block';
}

function nextQuestion() {
  if (autoTimer) clearAutoTimer();
  currentIndex++;
  if (currentIndex < totalQuestions) {
    renderQuestion();
  } else {
    showResult();
  }
  // إعادة حفظ التقدم بعد الانتقال
  saveProgress();
}

function showResult() {
  clearAutoTimer();
  const percent = Math.round((correctCount / totalQuestions) * 100);
  let msg = '';
  if (percent >= 90) msg = '🏆 ممتاز! أنت نجم';
  else if (percent >= 70) msg = '⭐ جيد جداً، واصل';
  else if (percent >= 50) msg = '📖 جيد، راجع الأخطاء';
  else msg = '💪 لا تيأس، المحاولة القادمة أفضل';
  const container = document.getElementById('quizContainer');
  container.innerHTML = `
    <div style="text-align:center;padding:40px">
      <div style="font-size:4rem;">🎓</div>
      <div style="font-size:3rem;font-weight:900;color:var(--primary)">${percent}%</div>
      <div style="font-size:1.3rem;margin:15px;">${msg}</div>
      <div style="display:flex;justify-content:center;gap:20px;margin:20px;flex-wrap:wrap;">
        <div>✅ صحيح: ${correctCount}</div><div>❌ خطأ: ${wrongCount}</div><div>⭐ نقاط: ${score}</div>
      </div>
    </div>
  `;
  nextBtn.style.display = 'none';
  // حذف التقدم بعد إنهاء الاختبار (اختياري: يمكن تركه للمراجعة)
  localStorage.removeItem('examProgress');
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function setActiveGrade(grade) {
  gradeBtns.forEach(btn => {
    if (parseInt(btn.dataset.grade) === grade) btn.classList.add('active');
    else btn.classList.remove('active');
  });
}
function setActiveSubject(subject) {
  subjectBtns.forEach(btn => {
    if (btn.dataset.subject === subject) btn.classList.add('active');
    else btn.classList.remove('active');
  });
}

// ربط الأحداث
const gradeBtns = document.querySelectorAll('.grade-btn');
const subjectBtns = document.querySelectorAll('.subject-btn');
gradeBtns.forEach(btn => btn.addEventListener('click', () => {
  currentGrade = parseInt(btn.dataset.grade);
  setActiveGrade(currentGrade);
  loadQuestions();
}));
subjectBtns.forEach(btn => btn.addEventListener('click', () => {
  currentSubject = btn.dataset.subject;
  setActiveSubject(currentSubject);
  loadQuestions();
}));
restartBtn.addEventListener('click', () => {
  localStorage.removeItem('examProgress');
  loadQuestions();
});
resetProgressBtn.addEventListener('click', resetProgress);
nextBtn.addEventListener('click', () => {
  clearAutoTimer();
  nextQuestion();
});

// بدء التشغيل
loadQuestions();
</script>
</body>
</html>
